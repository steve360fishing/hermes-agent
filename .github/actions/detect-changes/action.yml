name: Detect affected areas
description: >-
  Classify a PR's or main-push's changed files into CI work lanes (python,
  frontend, site, scan, deps, mcp_catalog) so the orchestrator can
  conditionally call only the sub-workflows a change can affect. Outputs fail
  open (everything "true") whenever a trustworthy diff cannot be computed.

outputs:
  python:
    description: Run Python tests / ruff / ty / windows-footguns.
    value: ${{ steps.classify.outputs.python }}
  frontend:
    description: Run the TypeScript typecheck matrix + desktop build.
    value: ${{ steps.classify.outputs.frontend }}
  docker_meta:
    description: Docker setup and meta files have changed.
    value: ${{ steps.classify.outputs.docker_meta }}
  site:
    description: Build the Docusaurus docs site.
    value: ${{ steps.classify.outputs.site }}
  scan:
    description: Run the supply-chain critical-pattern scanner.
    value: ${{ steps.classify.outputs.scan }}
  deps:
    description: Check pyproject.toml dependency upper bounds.
    value: ${{ steps.classify.outputs.deps }}
  mcp_catalog:
    description: Require MCP catalog security review label.
    value: ${{ steps.classify.outputs.mcp_catalog }}

runs:
  using: composite
  steps:
    - name: Classify changed files
      id: classify
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
        REPO: ${{ github.repository }}
        EVENT_NAME: ${{ github.event_name }}
        PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
        PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        PUSH_BEFORE_SHA: ${{ github.event.before }}
        PUSH_AFTER_SHA: ${{ github.event.after }}
      run: |
        set -euo pipefail

        # Use event-pinned SHAs instead of a mutable ref. PRs and main pushes
        # can therefore avoid unrelated runners, while a missing/invalid diff
        # still deliberately falls through to the classifier's fail-open path.
        BASE_SHA=""
        HEAD_SHA=""
        case "$EVENT_NAME" in
          pull_request)
            BASE_SHA="$PR_BASE_SHA"
            HEAD_SHA="$PR_HEAD_SHA"
            ;;
          push)
            BASE_SHA="$PUSH_BEFORE_SHA"
            HEAD_SHA="$PUSH_AFTER_SHA"
            ;;
        esac

        CHANGED=""
        ZERO_SHA="0000000000000000000000000000000000000000"
        if [ -n "$BASE_SHA" ] && [ -n "$HEAD_SHA" ] \
          && [ "$BASE_SHA" != "$ZERO_SHA" ] && [ "$HEAD_SHA" != "$ZERO_SHA" ]; then
          if ! CHANGED="$(gh api \
            --paginate \
            "repos/${REPO}/compare/${BASE_SHA}...${HEAD_SHA}" \
            --jq '.files[].filename')"; then
            echo "Could not compute changed files; running all lanes." >&2
            CHANGED=""
          fi
        else
          echo "No trustworthy diff anchors; running all lanes." >&2
        fi

        echo "Changed files:"
        printf '%s\n' "${CHANGED:-(none)}"
        printf '%s\n' "${CHANGED:-}" | python3 scripts/ci/classify_changes.py
