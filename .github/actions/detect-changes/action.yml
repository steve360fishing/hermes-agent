name: Detect affected areas
description: >-
  Classify a PR's or main-push's changed files into CI work lanes (python,
  frontend, site, scan, deps, mcp_catalog) so the orchestrator can
  conditionally call only the sub-workflows a change can affect. Outputs fail
  open (everything "true") whenever a trustworthy diff cannot be computed.

inputs:
  github-token:
    description: Token for the GitHub API (gh CLI). Pass secrets.AUTOFIX_BOT_PAT from the calling workflow.
    required: false
    default: ${{ github.token }}

outputs:
  python:
    description: Run Python tests / ruff / ty / windows-footguns.
    value: ${{ steps.classify.outputs.python }}
  frontend:
    description: Run the TypeScript testing matrix + desktop build.
    value: ${{ steps.classify.outputs.frontend }}
  docker_meta:
    description: Docker setup and meta files have changed.
    value: ${{ steps.classify.outputs.docker_meta }}
  site:
    description: Build the Docusaurus docs site.
    value: ${{ steps.classify.outputs.site }}
  scan:
    description: Run the supply-chain critical-pattern scanner.
    value: ${{ steps.classify.outputs.scan }}
  deps:
    description: Check pyproject.toml dependency upper bounds.
    value: ${{ steps.classify.outputs.deps }}
  npm_lock:
    description: Post/update the semantic package-lock.json diff PR comment.
    value: ${{ steps.classify.outputs.npm_lock }}
  mcp_catalog:
    description: Require MCP catalog security review label.
    value: ${{ steps.classify.outputs.mcp_catalog }}
  ci_review:
    description: Require CI-sensitive file review label.
    value: ${{ steps.classify.outputs.ci_review }}

runs:
  using: composite
  steps:
    - name: Classify changed files
      id: classify
      shell: bash
      env:
        # Fall back to the built-in read-only token when the caller passes an
        # empty value. Fork PRs get no repo secrets, so AUTOFIX_BOT_PAT is ""
        # there, and an input `default:` only applies when the input is omitted,
        # not when it's passed empty. Without this fallback the compare API
        # fails on forks and the classifier fails open (every lane forced on).
        GH_TOKEN: ${{ inputs.github-token || github.token }}
        REPO: ${{ github.repository }}
        EVENT_NAME: ${{ github.event_name }}
        PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
        PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        PUSH_BEFORE_SHA: ${{ github.event.before }}
        PUSH_AFTER_SHA: ${{ github.event.after }}
      run: |
        set -euo pipefail

        # Use event-pinned SHAs instead of a mutable ref. PRs and main pushes
        # can therefore avoid unrelated runners, while a missing/invalid diff
        # still deliberately falls through to the classifier's fail-open path.
        BASE_SHA=""
        HEAD_SHA=""
        case "$EVENT_NAME" in
          pull_request)
            BASE_SHA="$PR_BASE_SHA"
            HEAD_SHA="$PR_HEAD_SHA"
            ;;
          push)
            BASE_SHA="$PUSH_BEFORE_SHA"
            HEAD_SHA="$PUSH_AFTER_SHA"
            ;;
        esac

        CHANGED=""
        COMPARE_OK="false"
        ZERO_SHA="0000000000000000000000000000000000000000"
        if [ -n "$BASE_SHA" ] && [ -n "$HEAD_SHA" ] \
          && [ "$BASE_SHA" != "$ZERO_SHA" ] && [ "$HEAD_SHA" != "$ZERO_SHA" ]; then
          # Retry transient API failures while preserving deterministic,
          # event-pinned compare anchors. `.files[]?` is null-safe on later
          # pagination pages whose `files` member is null.
          for i in 1 2 3; do
            if CHANGED="$(gh api \
              --paginate \
              "repos/${REPO}/compare/${BASE_SHA}...${HEAD_SHA}" \
              --jq '.files[]?.filename')"; then
              COMPARE_OK="true"
              break
            fi
            if [ "$i" = 3 ]; then
              echo "::warning::compare API failed after 3 attempts — failing open"
              CHANGED=""
              break
            fi
            echo "::warning::compare API failed (attempt $i); retrying in 10s"
            sleep 10
          done

          # GitHub's compare API caps the file list at 300. A capped list is
          # incomplete and must not suppress any CI lane.
          if [ "$COMPARE_OK" = "true" ]; then
            CHANGED_COUNT="$(printf '%s\n' "$CHANGED" | sed '/^$/d' | wc -l | tr -d ' ')"
            if [ "$CHANGED_COUNT" -ge 300 ]; then
              echo "::warning::compare file list reached the 300-file cap — failing open"
              CHANGED=""
            fi
          fi
        else
          echo "No trustworthy diff anchors; running all lanes." >&2
        fi

        echo "Changed files:"
        printf '%s\n' "${CHANGED:-(none)}"
        printf '%s\n' "${CHANGED:-}" | python3 scripts/ci/classify_changes.py
